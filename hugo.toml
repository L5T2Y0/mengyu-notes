# 你的站点域名，必须带https://
baseURL = "https://imengyu.space/"
# 站点名称，就是你要的Mengyu Notes
title = "Mengyu Notes"
# 语言设置为中文
languageCode = "zh-CN"
defaultContentLanguage = "zh"
# 默认主题
theme = "PaperMod"
# 开启大小写不敏感的URL，避免链接错误
disablePathToLower = false
# 开启代码高亮
highlight = true

# 主题基础参数配置
[params]
  # 站点描述，会显示在搜索引擎结果里
  description = "Mengyu的个人笔记站点，记录技术与生活"
  # 默认主题：auto表示自动跟随系统切换深色/浅色模式
  defaultTheme = "auto"
  # 显示代码复制按钮
  ShowCodeCopyButtons = true
  # 显示阅读时间
  ShowReadingTime = true
  # 关闭分享按钮
  ShowShareButtons = false
  # 显示面包屑导航
  ShowBreadCrumbs = true
  # 开启搜索功能
  enableSearch = true
  
  # 文章目录配置
  ShowToc = true
  TocOpen = true
  
  # 显示字数统计
  ShowWordCount = true
  # 显示文章更新日期
  ShowLastMod = true
  
  # 显示返回顶部按钮
  ShowScrollToTop = true
  
  # 搜索配置
  searchPlaceholder = "搜索文章..."
  
  # 默认开启评论
  comments = true

# giscus 评论系统配置
[params.giscus]
  repo = "L5T2Y0/mengyu-notes"
  repoID = "R_kgDOR4qOvg"
  category = "Announcements"
  categoryID = "DIC_kwDOR4qOvs4C58U6"
  mapping = "pathname"
  strict = "0"
  reactionsEnabled = "1"
  emitMetadata = "0"
  inputPosition = "bottom"
  theme = "preferred_color_scheme"
  lang = "zh-CN"

# 网站图标配置
[params.assets]
  favicon = "/favicon.ico"

# --------------- 首页个人简介+头像配置---------------
# 首页简短介绍
[params.homeInfoParams]
Title = "欢迎来到 Mengyu Notes"
imageUrl = "/assets/avatar.jpg"
imageTitle = "Mengyu"
imageWidth = 120
imageHeight = 120
Content = """
这里记录我的技术学习和生活日常

[关于我 →](/about/)
"""

# 社交链接配置
[[params.socialIcons]]
name = "github"
url = "https://github.com/L5T2Y0"

# 顶部导航菜单配置
[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 2
  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 3
  [[menu.main]]
    name = "分类"
    url = "/categories/"
    weight = 4
  [[menu.main]]
    name = "搜索"
    url = "/search/"
    weight = 5
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 6

# 开启搜索功能的输出配置
[outputs]
  home = ["HTML", "RSS", "JSON"]

# 允许在 Markdown 中使用 HTML
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true