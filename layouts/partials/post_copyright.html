{{- if not (.Param "hideCopyright") }}
<div class="post-copyright" style="margin-top: 40px; padding: 20px; background: var(--code-bg); border-left: 4px solid var(--primary); border-radius: 4px;">
    <div style="margin-bottom: 10px;">
        <strong>📄 本文标题：</strong>{{ .Title }}
    </div>
    <div style="margin-bottom: 10px;">
        <strong>🔗 本文链接：</strong><a href="{{ .Permalink }}" style="word-break: break-all;">{{ .Permalink }}</a>
    </div>
    <div style="margin-bottom: 10px;">
        <strong>✍️ 作者：</strong>{{ site.Title }}
    </div>
    <div style="margin-bottom: 10px;">
        <strong>📅 发布时间：</strong>{{ .Date.Format "2006-01-02" }}
    </div>
    {{- if .Lastmod }}
    <div style="margin-bottom: 10px;">
        <strong>🔄 最后更新：</strong>{{ .Lastmod.Format "2006-01-02" }}
    </div>
    {{- end }}
    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); color: var(--secondary);">
        <strong>📝 版权声明：</strong>本文由 {{ site.Title }} 原创，采用 
        <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" rel="noopener">CC BY-NC-SA 4.0</a> 
        许可协议。转载请注明出处！
    </div>
</div>
{{- end }}
